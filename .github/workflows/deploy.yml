name: Test and Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}

      - name: Run tests
        working-directory: ./backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/testdb
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: test-secret-that-is-at-least-32-characters-long!
          PAGESPEED_API_KEY: test-key
          MAIL_USERNAME: test@test.com
          MAIL_PASSWORD: test-password
          ALLOWED_ORIGIN: http://localhost:3000
        run: mvn test -B

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/leonwu813/marketing-analytics:latest

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -T 30 ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts || true

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} '
            docker pull ghcr.io/leonwu813/marketing-analytics:latest
            docker stop marketing-analytics-app || true
            docker rm marketing-analytics-app || true
            docker run -d \
              --name marketing-analytics-app \
              --restart unless-stopped \
              --env-file /home/ubuntu/app.env \
              -p 8080:8080 \
              ghcr.io/leonwu813/marketing-analytics:latest
            docker image prune -f
          '