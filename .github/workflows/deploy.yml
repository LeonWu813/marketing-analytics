name: Test and Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}

      - name: Run tests
        working-directory: ./backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/testdb
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: test-secret-that-is-at-least-32-characters-long!
          PAGESPEED_API_KEY: test-key
          MAIL_USERNAME: test@test.com
          MAIL_PASSWORD: test-password
          ALLOWED_ORIGIN: http://localhost:3000
        run: mvn test -B

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: ./backend
        run: docker build -t marketing-analytics .

      - name: Save Docker image
        run: docker save marketing-analytics | gzip > marketing-analytics.tar.gz

      - name: Copy image to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: marketing-analytics.tar.gz
          target: /home/ubuntu/

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker load < /home/ubuntu/marketing-analytics.tar.gz
            docker stop marketing-analytics-app || true
            docker rm marketing-analytics-app || true
            docker run -d \
              --name marketing-analytics-app \
              --restart unless-stopped \
              --env-file /home/ubuntu/app.env \
              -p 8080:8080 \
              marketing-analytics
            rm /home/ubuntu/marketing-analytics.tar.gz
            docker image prune -f